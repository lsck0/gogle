name: Meowify Repository

on:
  push:
    branches:
      - master

jobs:
  meow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Meowify files
        run: |
          python << 'EOF'
          import os
          import re

          def process_file(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()
                  new_content = re.sub(r'\b\w+\b', 'meow', content)
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new_content)
              except:
                  pass

          for root, dirs, files in os.walk("."):
              if ".git" in root:
                  continue
              for file in files:
                  process_file(os.path.join(root, file))
          EOF

      - name: Commit and push to meow branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -B meow
          git add .
          git commit -m "meowify repository" || echo "No changes to commit"
          git push origin meow --force
