listen_addresses = '*'

# ---------------------------------
# Memory Settings
# ---------------------------------
shared_buffers = 1GB
effective_cache_size = 2GB
work_mem = 32MB
maintenance_work_mem = 1GB

# ---------------------------------
# WAL & Checkpoints (for PITR + WAL-G)
# ---------------------------------
wal_level = replica                   # needed for PITR + backups
synchronous_commit = on               # ensure durability
full_page_writes = on                 # protects against torn pages
wal_compression = on
archive_mode = on
archive_command = 'wal-g wal-push %p'
archive_timeout = 60s

max_wal_size = 8GB
min_wal_size = 2GB
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9    # spread I/O load

# ---------------------------------
# Parallelism
# ---------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
parallel_setup_cost = 1000
parallel_tuple_cost = 0.1

# ---------------------------------
# Query Planner & Disk
# ---------------------------------
random_page_cost = 1.1                # SSD/NVMe
seq_page_cost = 1.0
effective_io_concurrency = 200        # NVMe: high concurrency
default_statistics_target = 250       # better plans for mixed workload

# ---------------------------------
# Connections
# ---------------------------------
max_connections = 150
superuser_reserved_connections = 5
idle_in_transaction_session_timeout = 5min

# ---------------------------------
# Logging
# ---------------------------------
log_destination = 'csvlog'
logging_collector = on
log_min_duration_statement = 500ms
log_checkpoints = on
log_autovacuum_min_duration = 0
log_line_prefix = '%m [%p] %u@%d '

# ---------------------------------
# Autovacuum
# ---------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 2000
