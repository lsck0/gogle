worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ssl
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';

    # headers
    server_tokens off;

    include       mime.types;
    default_type  application/octet-stream;

    add_header Cache-Control "no-store" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), autoplay=()" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "
        base-uri 'self';
        connect-src 'self';
        default-src 'self';
        font-src 'self' data:;
        form-action 'self';
        frame-ancestors 'self';
        frame-src 'none';
        img-src 'self' data:;
        media-src 'self' data:;
        object-src 'none';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        upgrade-insecure-requests;
        worker-src 'self';
    " always;

    # timeouts and limits
    client_body_timeout 10;
    client_header_timeout 10;
    send_timeout 10;
    keepalive_timeout 10;
    client_max_body_size 1M;

    limit_req_zone $binary_remote_addr zone=rate_limit:50m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:50m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # server {
    #     listen 80;
    #
    #     limit_req zone=rate_limit burst=100 nodelay;
    #     limit_conn conn_limit 25;
    #
    #     if ($request_method !~ ^(OPTIONS|GET|POST|PUT|PATCH|DELETE)$ ) {
    #         return 444;
    #     }
    #
    #     location / {
    #         proxy_pass http://server:80;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Http-Version $server_protocol;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #     }
    # }

    server {
        server_name ~^pgweb\..*$;

        listen 80;
        listen [::]:80;

        location / {
            proxy_pass http://pgweb:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Http-Version $server_protocol;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # healthcheck
    server {
        listen 6666;

        access_log off;

        location /health {
            allow 127.0.0.1;
            deny all;

            return 200;
        }

        location /status {
            stub_status on;
        }
    }
}
